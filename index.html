<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service 2 - Тест</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #18181b; 
            color: #ececec; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .container { 
            background: #242427; 
            padding: 25px; 
            border-radius: 8px; 
            width: 100%;
            max-width: 320px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h3 {
            margin-bottom: 20px;
            font-size: 18px;
            text-align: center;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 12px;
        }

        input { 
            width: 100%; 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #3f3f46; 
            background: #1c1c1f; 
            color: #fff; 
            font-size: 14px;
            outline: none;
        }
        input:focus {
            border-color: #4f46e5;
        }

        .btn { 
            width: 100%; 
            padding: 10px; 
            background: #4f46e5; 
            border: none; 
            color: white; 
            border-radius: 6px; 
            font-weight: 500; 
            cursor: pointer; 
            margin-top: 8px;
        }
        .btn:hover { 
            background: #4338ca; 
        }
        
        .hidden { display: none; }
        
        #result { 
            margin-top: 15px; 
            padding: 10px;
            background: #14532d;
            border: 1px solid #16a34a;
            border-radius: 6px;
            font-size: 14px; 
            color: #4ade80; 
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="step-auth">
        <h3>Регистрация</h3>
        <div class="form-group"><input type="text" id="name" placeholder="Имя"></div>
        <div class="form-group"><input type="number" id="age" placeholder="Возраст"></div>
        <button class="btn" id="btn-login">Войти</button>
    </div>

    <div id="step-mixer" class="hidden">
        <h3>Перемешивание строк</h3>
        <div class="form-group"><input type="text" id="text-to-mix" placeholder="Введите текст"></div>
        <button class="btn" id="btn-mix">Перемешать</button>
        <div id="result" class="hidden"></div>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:8000/api"; 

    const authStep = document.getElementById('step-auth');
    const mixerStep = document.getElementById('step-mixer');
    const resultDiv = document.getElementById('result');

    document.getElementById('btn-login').onclick = async () => {
        const name = document.getElementById('name').value.trim();
        const age = document.getElementById('age').value;

        if (!name || !age) {
            alert('Заполните все поля!');
            return;
        }

        try {
            const res = await fetch(`${API_BASE}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, age: +age }) 
            });

            const data = await res.json();

            if (!res.ok) {
                console.log('ошибка авторизации:', data);
                // Исправлен синтаксис опциональной цепочки ?.
                alert(data.detail?.[0]?.msg || data.detail || 'Ошибка регистрации');
                return;
            }

            authStep.classList.add('hidden');
            mixerStep.classList.remove('hidden');

        } catch (e) {
            console.error(e);
            alert('Сервер лежит');
        }
    };

    document.getElementById('btn-mix').onclick = async () => {
        const text = document.getElementById('text-to-mix').value.trim();
        if (!text) return alert('Введите текст');

        try {
            const res = await fetch(`${API_BASE}/mix`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });

            const data = await res.json();
            
            resultDiv.textContent = data.result;
            resultDiv.classList.remove('hidden');
        } catch (err) {
            console.error(err);
            alert('Не удалось перемешать');
        }
    };
</script>
</body>
</html>
